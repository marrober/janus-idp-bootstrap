apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipelines-installer-sa
  namespace: pipelines-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipelines-operator-installer-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: pipelines-installer-sa
  namespace: pipelines-operator